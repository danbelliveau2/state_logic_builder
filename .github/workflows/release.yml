name: Build & Release

# Triggers on every push to main.
# To release a new version, Dan only needs to:
#   1. Update APP_VERSION in src/lib/version.js  (e.g. '1.14' -> '1.15')
#   2. git commit & push
# GitHub Actions syncs package.json, builds the installer, and publishes the release.
# All installed copies auto-update within 15 minutes.

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  check-version:
    name: Check if APP_VERSION changed
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      semver: ${{ steps.extract.outputs.semver }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract APP_VERSION from version.js
        id: extract
        run: |
          VERSION=$(node -e "const fs=require('fs');const c=fs.readFileSync('src/lib/version.js','utf8');const m=c.match(/APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]/) ;if(!m){process.exit(1);}console.log(m[1]);")
          PARTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
          if [ "$PARTS" -lt 2 ]; then
            SEMVER="${VERSION}.0.0"
          elif [ "$PARTS" -lt 3 ]; then
            SEMVER="${VERSION}.0"
          else
            SEMVER="$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION  semver=$SEMVER"

      - name: Check if APP_VERSION changed vs previous commit
        id: check
        run: |
          PREV=$(git show HEAD~1:src/lib/version.js 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const m=d.match(/APP_VERSION\s*=\s*['\"]([^'\"]+)['\"]/) ;console.log(m?m[1]:'none');})" || echo "none")
          CURR="${{ steps.extract.outputs.version }}"
          echo "Previous: $PREV  Current: $CURR"
          if [ "$PREV" != "$CURR" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    name: Build installer & publish release
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync package.json version from APP_VERSION
        run: npm version ${{ needs.check-version.outputs.semver }} --no-git-tag-version --allow-same-version

      - name: Build React app
        run: npm run build

      - name: Package & publish Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always

      - name: Upload installer as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: installer-v${{ needs.check-version.outputs.semver }}
          path: release/SDC-State-Logic-Builder-Setup-*.exe
          retention-days: 90
