<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <style>
      .s{fill:none;stroke:#9aa8b5;stroke-width:0.5;opacity:0.15}
      .f{fill:none;stroke:#9aa8b5;stroke-width:0.3;opacity:0.10}
      .t{font-family:monospace;font-size:5px;fill:#9aa8b5;opacity:0.10}
      .p{fill:#9aa8b5;opacity:0.10}
    </style>
  </defs>

  <!-- Gear A (wraps top-left ↔ bottom-right) -->
  <g transform="translate(80,80)">
    <circle cx="0" cy="0" r="28" class="s"/>
    <circle cx="0" cy="0" r="20" class="s"/>
    <circle cx="0" cy="0" r="6" class="s"/>
    <line x1="0" y1="-28" x2="0" y2="-35" class="s"/><line x1="-4" y1="-35" x2="4" y2="-35" class="s"/><line x1="4" y1="-35" x2="4" y2="-28" class="s"/><line x1="-4" y1="-35" x2="-4" y2="-28" class="s"/>
    <line x1="0" y1="28" x2="0" y2="35" class="s"/><line x1="-4" y1="35" x2="4" y2="35" class="s"/><line x1="4" y1="35" x2="4" y2="28" class="s"/><line x1="-4" y1="35" x2="-4" y2="28" class="s"/>
    <line x1="28" y1="0" x2="35" y2="0" class="s"/><line x1="35" y1="-4" x2="35" y2="4" class="s"/><line x1="35" y1="4" x2="28" y2="4" class="s"/><line x1="35" y1="-4" x2="28" y2="-4" class="s"/>
    <line x1="-28" y1="0" x2="-35" y2="0" class="s"/><line x1="-35" y1="-4" x2="-35" y2="4" class="s"/><line x1="-35" y1="4" x2="-28" y2="4" class="s"/><line x1="-35" y1="-4" x2="-28" y2="-4" class="s"/>
    <line x1="19.8" y1="-19.8" x2="24.7" y2="-24.7" class="s"/><line x1="-19.8" y1="19.8" x2="-24.7" y2="24.7" class="s"/>
    <line x1="19.8" y1="19.8" x2="24.7" y2="24.7" class="s"/><line x1="-19.8" y1="-19.8" x2="-24.7" y2="-24.7" class="s"/>
  </g>

  <!-- Same gear wrapping at +600,+600 for seamless tile -->
  <g transform="translate(680,680)">
    <circle cx="0" cy="0" r="28" class="s"/>
    <circle cx="0" cy="0" r="20" class="s"/>
    <circle cx="0" cy="0" r="6" class="s"/>
    <line x1="0" y1="-28" x2="0" y2="-35" class="s"/><line x1="-4" y1="-35" x2="4" y2="-35" class="s"/>
    <line x1="-28" y1="0" x2="-35" y2="0" class="s"/><line x1="-35" y1="-4" x2="-35" y2="4" class="s"/>
    <line x1="-19.8" y1="-19.8" x2="-24.7" y2="-24.7" class="s"/>
  </g>

  <!-- Dimension H1 -->
  <g transform="translate(220,55)">
    <line x1="0" y1="0" x2="120" y2="0" class="f"/>
    <line x1="0" y1="-6" x2="0" y2="6" class="f"/>
    <line x1="120" y1="-6" x2="120" y2="6" class="f"/>
    <polygon points="0,0 7,2 7,-2" class="p"/><polygon points="120,0 113,2 113,-2" class="p"/>
    <text x="60" y="-3" class="t" text-anchor="middle">156.50</text>
  </g>

  <!-- Plate with holes (center) -->
  <g transform="translate(320,200)">
    <rect x="0" y="0" width="100" height="70" class="s"/>
    <line x1="-8" y1="35" x2="108" y2="35" class="f" stroke-dasharray="6,3,2,3"/>
    <line x1="50" y1="-8" x2="50" y2="78" class="f" stroke-dasharray="6,3,2,3"/>
    <circle cx="50" cy="35" r="16" class="s"/>
    <circle cx="50" cy="35" r="10" class="f"/>
    <circle cx="15" cy="15" r="4" class="f"/><line x1="12" y1="15" x2="18" y2="15" class="f"/><line x1="15" y1="12" x2="15" y2="18" class="f"/>
    <circle cx="85" cy="15" r="4" class="f"/><line x1="82" y1="15" x2="88" y2="15" class="f"/><line x1="85" y1="12" x2="85" y2="18" class="f"/>
    <circle cx="15" cy="55" r="4" class="f"/><circle cx="85" cy="55" r="4" class="f"/>
  </g>

  <!-- Dimension V1 -->
  <g transform="translate(45,200)">
    <line x1="0" y1="0" x2="0" y2="100" class="f"/>
    <line x1="-6" y1="0" x2="6" y2="0" class="f"/>
    <line x1="-6" y1="100" x2="6" y2="100" class="f"/>
    <polygon points="0,0 2,7 -2,7" class="p"/><polygon points="0,100 2,93 -2,93" class="p"/>
    <text x="-4" y="54" class="t" text-anchor="middle" transform="rotate(-90,-4,54)">89.25</text>
  </g>

  <!-- Bearing (bottom-left) -->
  <g transform="translate(130,430)">
    <circle cx="0" cy="0" r="32" class="s"/>
    <circle cx="0" cy="0" r="24" class="f"/>
    <circle cx="0" cy="0" r="13" class="s"/>
    <circle cx="0" cy="0" r="8" class="f"/>
    <circle cx="0" cy="0" r="3" class="s"/>
    <line x1="-32" y1="0" x2="32" y2="0" class="f" stroke-dasharray="6,3,2,3"/>
    <line x1="0" y1="-32" x2="0" y2="32" class="f" stroke-dasharray="6,3,2,3"/>
  </g>

  <!-- Cross-hatch section -->
  <g transform="translate(390,400)">
    <rect x="0" y="0" width="70" height="45" class="s"/>
    <line x1="0" y1="9" x2="9" y2="0" class="f"/><line x1="0" y1="18" x2="18" y2="0" class="f"/>
    <line x1="0" y1="27" x2="27" y2="0" class="f"/><line x1="0" y1="36" x2="36" y2="0" class="f"/>
    <line x1="0" y1="45" x2="45" y2="0" class="f"/><line x1="9" y1="45" x2="54" y2="0" class="f"/>
    <line x1="18" y1="45" x2="63" y2="0" class="f"/><line x1="27" y1="45" x2="70" y2="2" class="f"/>
    <line x1="36" y1="45" x2="70" y2="11" class="f"/><line x1="45" y1="45" x2="70" y2="20" class="f"/>
    <line x1="54" y1="45" x2="70" y2="29" class="f"/><line x1="63" y1="45" x2="70" y2="38" class="f"/>
  </g>

  <!-- L-bracket side view -->
  <g transform="translate(460,90)">
    <path d="M0,0 L50,0 L50,18 L65,18 L65,70 L50,70 L50,88 L0,88 Z" class="s"/>
    <line x1="-8" y1="44" x2="73" y2="44" class="f" stroke-dasharray="6,3,2,3"/>
    <circle cx="25" cy="44" r="12" class="f"/>
    <circle cx="25" cy="44" r="8" class="s"/>
  </g>

  <!-- Shaft with keyway -->
  <g transform="translate(250,480)">
    <rect x="0" y="12" width="110" height="26" class="s"/>
    <line x1="0" y1="25" x2="110" y2="25" class="f" stroke-dasharray="6,3,2,3"/>
    <rect x="30" y="7" width="22" height="5" class="s"/>
    <text x="55" y="5" class="t" text-anchor="middle">KEY 6x6</text>
  </g>

  <!-- Dimension H2 -->
  <g transform="translate(300,370)">
    <line x1="0" y1="0" x2="80" y2="0" class="f"/>
    <line x1="0" y1="-5" x2="0" y2="5" class="f"/>
    <line x1="80" y1="-5" x2="80" y2="5" class="f"/>
    <polygon points="0,0 6,2 6,-2" class="p"/><polygon points="80,0 74,2 74,-2" class="p"/>
    <text x="40" y="-3" class="t" text-anchor="middle">210.00</text>
  </g>

  <!-- Tolerance callout -->
  <g transform="translate(200,155)">
    <rect x="0" y="0" width="48" height="16" class="f"/>
    <text x="24" y="7" class="t" text-anchor="middle">Ø25 H7</text>
    <text x="24" y="14" class="t" text-anchor="middle">+0.021/0</text>
  </g>

  <!-- Angular dimension -->
  <g transform="translate(500,510)">
    <line x1="0" y1="0" x2="55" y2="0" class="f"/>
    <line x1="0" y1="0" x2="39" y2="-39" class="f"/>
    <path d="M28,0 A28,28 0 0,1 19.8,-19.8" class="f"/>
    <text x="27" y="-8" class="t">45°</text>
  </g>

  <!-- Surface finish -->
  <g transform="translate(530,340)">
    <path d="M0,16 L8,0 L12,16" class="f"/>
    <line x1="8" y1="0" x2="28" y2="0" class="f"/>
    <text x="14" y="-3" class="t">Ra 1.6</text>
  </g>

  <!-- Small gear (wraps right edge → left edge) -->
  <g transform="translate(570,160) scale(0.6)">
    <circle cx="0" cy="0" r="22" class="s"/>
    <circle cx="0" cy="0" r="15" class="s"/>
    <circle cx="0" cy="0" r="5" class="s"/>
    <line x1="0" y1="-22" x2="0" y2="-28" class="s"/><line x1="-3" y1="-28" x2="3" y2="-28" class="s"/>
    <line x1="22" y1="0" x2="28" y2="0" class="s"/><line x1="28" y1="-3" x2="28" y2="3" class="s"/>
    <line x1="0" y1="22" x2="0" y2="28" class="s"/>
    <line x1="-22" y1="0" x2="-28" y2="0" class="s"/>
  </g>
  <!-- Same gear wrapping left edge -->
  <g transform="translate(-30,160) scale(0.6)">
    <circle cx="0" cy="0" r="22" class="s"/>
    <circle cx="0" cy="0" r="15" class="s"/>
    <circle cx="0" cy="0" r="5" class="s"/>
    <line x1="22" y1="0" x2="28" y2="0" class="s"/><line x1="28" y1="-3" x2="28" y2="3" class="s"/>
    <line x1="0" y1="-22" x2="0" y2="-28" class="s"/>
    <line x1="0" y1="22" x2="0" y2="28" class="s"/>
  </g>

  <!-- Title block hint (wraps bottom-right ↔ top-left) -->
  <g transform="translate(480,555)">
    <rect x="0" y="0" width="120" height="36" class="f"/>
    <line x1="60" y1="0" x2="60" y2="36" class="f"/>
    <line x1="0" y1="12" x2="120" y2="12" class="f"/>
    <line x1="0" y1="24" x2="120" y2="24" class="f"/>
    <text x="30" y="9" class="t" text-anchor="middle">DRAWN</text>
    <text x="30" y="21" class="t" text-anchor="middle">CHECKED</text>
    <text x="90" y="9" class="t" text-anchor="middle">DATE</text>
    <text x="90" y="33" class="t" text-anchor="middle">REV A</text>
  </g>
</svg>
